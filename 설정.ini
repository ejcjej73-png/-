[설정]
# ───────────────────────────────────────────────
#  이 파일을 news_scrap.exe 와 같은 폴더에 두면
#  파이썬 없이 메모장으로 설정을 바꿀 수 있습니다.
#  (저장할 때 인코딩은 'UTF-8' 로 저장하세요)
# ───────────────────────────────────────────────

# 네이버 검색 API 키 (없으면 비워 두세요 → 구글 뉴스 RSS 사용)
naver_id =
naver_secret =

# 며칠 전 기사까지 수집할지 (1 = 오늘만, 7 = 일주일)
days_back = 1

# 키워드당 최대 건수
max_per_keyword = 30

# 저장 파일명
output_file = 카드외환_뉴스스크랩.xlsx

# 검색 키워드 (쉼표로 구분, 자유롭게 추가/삭제)
카드_키워드 = 신용카드, 체크카드, 카드사, 카드 수수료, 해외결제 카드, 간편결제, 카드 연체
외환_키워드 = 외환, 환율, 원달러 환율, 해외송금, 외국환거래법, 외화예금, 환전
